name: Selenium E2E

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run tests (exclude known-failure)
        run: mvn test -DexcludedGroups=knownFailure
        continue-on-error: true
        env:
          BASE_URL: https://www.saucedemo.com
          DEFAULT_USERNAME: standard_user
          DEFAULT_PASSWORD: secret_sauce

      - name: Run known-failure tests (do not fail build)
        run: mvn test -DexcludedGroups= -Dgroups=knownFailure
        continue-on-error: true
        env:
          BASE_URL: https://www.saucedemo.com
          DEFAULT_USERNAME: standard_user
          DEFAULT_PASSWORD: secret_sauce

      - name: Generate Allure report
        if: always()
        run: mvn allure:report -q
        env:
          BASE_URL: https://www.saucedemo.com

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin/

      - name: Send Results to Showcase Repository
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
        run: |
          # 1. Configuración de identidad
          git config --global user.name "Quality Master Engineer"
          git config --global user.email "qa-automation@qme.com"
          
          # 2. Clonar el repositorio de visualización pública
          # Usamos la variable API_TOKEN_GITHUB para tener permisos de escritura
          git clone https://$GITHUB_TOKEN@github.com/qualitymasterengineer/selenium-test-allure-showcase.git showcase-repo
          
          # 3. Mover los resultados de Allure generados por Maven
          # Maven los guarda en target/allure-results según tu pom.xml
          mkdir -p showcase-repo/allure-results
          cp -r target/allure-results/* showcase-repo/allure-results/
          
          # 4. Sincronizar y subir los cambios
          cd showcase-repo
          git add allure-results/
          git commit -m "chore: automated update of selenium test results" || echo "No changes to commit"
          git push origin main
